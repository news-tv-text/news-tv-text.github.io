name: Update News

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Restore news.db cache
        uses: actions/cache@v4
        with:
          path: pipeline/news.db
          key: news-db-static
          restore-keys: |
            news-db-

      - name: Run pipeline
        env:
          OPENMODEL_API_KEY: ${{ secrets.OPENMODEL_API_KEY }}
          OPENMODEL_BASE_URL: ${{ secrets.OPENMODEL_BASE_URL }}
          OPENMODEL_MODEL: ${{ secrets.OPENMODEL_MODEL }}
        run: python pipeline/run.py

      - name: Show diff (debug)
        run: |
          echo "--- git status ---"
          git status
          echo "--- git diff data.json (stat) ---"
          git diff --stat data.json || true

      - name: Commit and push data.json
        run: |
          git config user.name "news-tv-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "Нет изменений в data.json — пропускаем коммит"
          else
            git commit -m "chore: update news data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
